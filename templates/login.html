{% extends "base.html" %}

{% block title %}Admin Login — MediExpert{% endblock %}

{% block content %}
<section class="page-header" style="padding: 120px 0 40px; text-align: center;">
    <div class="container">
        <h1 style="justify-content: center;"><i class="fas fa-lock"></i> Admin Login</h1>
        <p>Silakan masuk untuk mengakses data pengunjung dan riwayat diagnosa.</p>
    </div>
</section>

<section class="section">
    <div class="container" style="max-width: 480px;">
        <div class="login-card" style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 32px; box-shadow: var(--shadow);">
            
            {% if error %}
            <div class="alert alert-danger" style="margin-bottom: 24px;">
                <i class="fas fa-exclamation-circle"></i> <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
                <div class="input-group-fancy" style="max-width: 100%; margin: 0 0 24px 0;">
                    <label for="username">Username</label>
                    <div style="position: relative;">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" name="username" class="input-fancy" placeholder="Masukkan username" required autocomplete="username">
                    </div>
                </div>

                <div class="input-group-fancy" style="max-width: 100%; margin: 0 0 32px 0;">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-key input-icon"></i>
                        <input type="password" id="password" name="password" class="input-fancy" placeholder="Masukkan password" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 16px; font-size: 1.05rem;">
                    <i class="fas fa-sign-in-alt"></i> Login Sekarang
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
