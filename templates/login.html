{% extends "base.html" %}

{% block title %}Admin Login — MediExpert{% endblock %}

{% block content %}
<div class="wizard-container" style="min-height: 70vh; display: flex; align-items: center;">
    <div class="container" style="max-width: 480px;">
        
        <div class="wizard-header mb-6">
            <div class="brand-icon" style="margin: 0 auto 16px;">
                <i class="fas fa-lock"></i>
            </div>
            <h2>Admin Login</h2>
            <p class="text-muted mt-2">Masuk untuk mengelola data riwayat pasien.</p>
        </div>

        <div class="form-card">
            {% if error %}
            <div class="disclaimer-alert mb-4" style="background-color: var(--danger-light); border-color: #fca5a5; color: #991b1b; padding: 12px 16px;">
                <i class="fas fa-exclamation-circle" style="color: var(--danger); font-size: 1.2rem;"></i>
                <div style="font-size: 0.9rem;">{{ error }}</div>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="input-control" placeholder="Masukkan username admin" required autocomplete="username">
                </div>

                <div class="input-group mb-6">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="input-control" placeholder="Masukkan password admin" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Masuk <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>
        </div>
        
    </div>
</div>
{% endblock %}
