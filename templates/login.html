{% extends "base.html" %}

{% block title %}Admin Login — Diagnova{% endblock %}

{% block content %}
<div class="py-12 px-4 flex-grow bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-[70vh]">
    <div class="max-w-md w-full">
        
        <div class="text-center mb-10" data-aos="fade-down">
            <div class="w-16 h-16 bg-brand-50 dark:bg-slate-800 text-brand-600 dark:text-brand-400 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-sm border border-brand-100 dark:border-slate-700">
                <i class="fas fa-lock"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Admin Login</h2>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Masuk untuk mengelola data rekam medis.</p>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-glass border border-slate-100 dark:border-slate-700" data-aos="zoom-in">
            {% if error %}
            <div class="bg-rose-50 dark:bg-rose-900/20 border border-rose-200 dark:border-rose-800 text-rose-800 dark:text-rose-400 rounded-xl p-4 mb-6 flex items-start gap-3">
                <i class="fas fa-exclamation-circle text-rose-600 dark:text-rose-400 mt-0.5 text-lg"></i>
                <div class="text-sm">{{ error }}</div>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-user text-slate-400 dark:text-slate-500"></i>
                        </div>
                        <input type="text" id="username" name="username" class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-brand-50 dark:focus:ring-brand-900/20 focus:border-brand-500 transition-all outline-none text-slate-700 dark:text-white" placeholder="admin" required autocomplete="username">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-key text-slate-400 dark:text-slate-500"></i>
                        </div>
                        <input type="password" id="password" name="password" class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-brand-50 dark:focus:ring-brand-900/20 focus:border-brand-500 transition-all outline-none text-slate-700 dark:text-white" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="w-full px-6 py-3.5 bg-slate-900 dark:bg-brand-600 hover:bg-slate-800 dark:hover:bg-brand-700 text-white font-semibold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 mt-8">
                    Masuk ke Dashboard <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>
        </div>
        
    </div>
</div>
{% endblock %}
